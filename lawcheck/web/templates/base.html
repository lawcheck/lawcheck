<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LawCheck{% endblock %}</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --card: #fff;
      --text: #1d1d1f;
      --muted: #6e6e73;
      --border: #e3e3e8;
      --crit: #d92d20;
      --warn: #dc6803;
      --info: #1570ef;
      --ok: #027a48;
      --accent: #1d4ed8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg); color: var(--text);
      line-height: 1.5;
    }
    .container { max-width: 920px; margin: 0 auto; padding: 32px 20px; }
    header { border-bottom: 1px solid var(--border); background: #fff; }
    header .container { padding: 16px 20px; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 18px; margin: 0; }
    header h1 a { color: inherit; text-decoration: none; }
    header .tagline { color: var(--muted); font-size: 13px; }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 16px; }

    .form-row { display: flex; gap: 8px; }
    .form-row input[type=url], .form-row input[type=text] {
      flex: 1; padding: 12px 14px; font-size: 16px; border: 1px solid var(--border); border-radius: 8px;
    }
    .form-row input[type=number] { width: 90px; padding: 12px 14px; font-size: 16px; border: 1px solid var(--border); border-radius: 8px; }
    button {
      padding: 12px 22px; background: var(--accent); color: #fff; border: 0; border-radius: 8px;
      font-size: 15px; font-weight: 500; cursor: pointer;
    }
    button:hover { background: #1e40af; }

    .pill { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.02em; }
    .pill.critical { background: #fef3f2; color: var(--crit); }
    .pill.warning  { background: #fffaeb; color: var(--warn); }
    .pill.info     { background: #eff8ff; color: var(--info); }
    .pill.ok       { background: #ecfdf3; color: var(--ok); }

    .summary { display: flex; gap: 12px; flex-wrap: wrap; margin: 8px 0 20px; }
    .summary .stat { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; }
    .summary .stat .n { font-size: 22px; font-weight: 600; margin-right: 6px; }
    .summary .stat.critical .n { color: var(--crit); }
    .summary .stat.warning  .n { color: var(--warn); }
    .summary .stat.info     .n { color: var(--info); }
    .summary .stat.ok       .n { color: var(--ok); }

    .block-title { font-size: 20px; margin: 28px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

    .finding { border-left: 4px solid var(--border); padding: 12px 14px; margin: 10px 0; background: #fafafa; border-radius: 0 8px 8px 0; }
    .finding.critical { border-color: var(--crit); }
    .finding.warning  { border-color: var(--warn); }
    .finding.info     { border-color: var(--info); }
    .finding.ok       { border-color: var(--ok); }
    .finding .head { display: flex; gap: 10px; align-items: center; margin-bottom: 6px; }
    .finding .head .check-id { font-family: ui-monospace, "SF Mono", monospace; font-size: 12px; color: var(--muted); }
    .finding .head .title { font-weight: 600; }
    .finding .evidence { color: var(--text); margin: 4px 0; }
    .finding .meta { color: var(--muted); font-size: 13px; }
    .finding .meta a { color: var(--accent); }
    .finding .rec { margin-top: 8px; padding: 8px 10px; background: #fff; border: 1px dashed var(--border); border-radius: 6px; font-size: 14px; }

    .recent { margin-top: 24px; }
    .recent .row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .recent .row:last-child { border-bottom: 0; }
    .recent a { color: var(--text); text-decoration: none; }
    .recent a:hover { color: var(--accent); }
    .recent .url { font-family: ui-monospace, monospace; font-size: 13px; color: var(--muted); }

    .status-banner { padding: 14px 18px; border-radius: 8px; margin-bottom: 16px; }
    .status-banner.running { background: #eff8ff; color: var(--info); }
    .status-banner.error   { background: #fef3f2; color: var(--crit); }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: -2px; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { color: var(--muted); font-size: 13px; text-align: center; padding: 30px 20px; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body>
  <header>
    <div class="container">
      <h1><a href="/">LawCheck</a></h1>
      <div class="tagline">проверка на соответствие 152-ФЗ</div>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
  <footer>
    Результаты анализа носят информационный и рекомендательный характер. Сервис не оказывает юридических услуг.
  </footer>
</body>
</html>
