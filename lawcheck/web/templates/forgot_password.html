{% extends "base.html" %}
{% block title %}Сброс пароля · LawCheck{% endblock %}
{% block content %}
<div class="card auth-card">
  <h1>Сброс пароля</h1>
  <p class="sub">Укажите email аккаунта — пришлём ссылку для нового пароля.</p>
  <form action="/forgot-password" method="post">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" name="email" required autocomplete="email"
             placeholder="you@company.ru">
    </div>
    <button type="submit" class="submit">Прислать ссылку</button>
  </form>
  <p class="alt">Вспомнили пароль? <a href="/login">Войти</a></p>
</div>
{% endblock %}
