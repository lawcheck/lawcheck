{% extends "base.html" %}
{% block title %}Новый пароль · LawCheck{% endblock %}
{% block content %}
<div class="card auth-card">
  <h1>Новый пароль</h1>
  <p class="sub">Задайте новый пароль для входа.</p>
  {% if error %}<div class="auth-error">{{ error }}</div>{% endif %}
  <form action="/reset-password" method="post">
    <input type="hidden" name="token" value="{{ token }}">
    <div class="field">
      <label for="password">Новый пароль</label>
      <input id="password" type="password" name="password" required minlength="8"
             autocomplete="new-password" placeholder="минимум 8 символов">
    </div>
    <button type="submit" class="submit">Сохранить пароль</button>
  </form>
</div>
{% endblock %}
