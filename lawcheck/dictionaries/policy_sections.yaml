# Маркеры обязательных разделов Политики обработки ПДн
# Логика: для каждой секции считаем, сколько маркеров найдено в нормализованном тексте.
# Если >= 1 strong маркер ИЛИ >= 2 weak — секция считается присутствующей.
# Нормализация: lowercase, ё→е, схлопывание пробелов и переносов.

