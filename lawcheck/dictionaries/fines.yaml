# Ориентировочные диапазоны административных штрафов для ЮРИДИЧЕСКИХ ЛИЦ по КоАП РФ.
#
# ВНИМАНИЕ: суммы приведены для оценки порядка риска и НЕ являются юридической
# консультацией. Размеры штрафов и редакции статей КоАП меняются (в частности,
# крупная реформа ответственности за нарушения в области ПДн — 420-ФЗ от 30.05.2025).
# Перед публичным использованием выверить актуальные значения с юристом.
#
# Суммарный риск в отчёте считается по НАБОРУ затронутых статей (групп), а не по
# каждому отдельному finding — несколько нарушений по одной статье не складываются.

groups:
  pdn_policy:        # отсутствие / неполнота Политики обработки ПДн
    koap: "ст. 13.11 ч. 3 КоАП РФ"
    min: 30000
    max: 60000
  pdn_general:       # обработка ПДн с нарушением требований 152-ФЗ
    koap: "ст. 13.11 ч. 1 КоАП РФ"
    min: 60000
    max: 100000
  pdn_consent:       # обработка без надлежащего согласия субъекта
    koap: "ст. 13.11 ч. 2 КоАП РФ"
    min: 300000
    max: 700000
  pdn_crossborder:   # трансграничная передача / локализация ПДн
    koap: "ст. 13.11 ч. 8 КоАП РФ"
    min: 1000000
    max: 6000000
  consumer_info:     # ЗОЗПП и Правила продажи — информация о товаре и продавце
    koap: "ст. 14.8 КоАП РФ"
    min: 5000
    max: 10000
  ads:               # ФЗ № 38-ФЗ «О рекламе»
    koap: "ст. 14.3 КоАП РФ"
    min: 100000
    max: 500000
  kids:              # ФЗ № 436-ФЗ «О защите детей от информации…»
    koap: "ст. 6.17 КоАП РФ"
    min: 20000
    max: 50000

# Привязка префикса check_id (часть до точки) к группе штрафа.
map:
  A1: pdn_policy
  A2: pdn_policy
  A3: pdn_policy
  B1: pdn_general
  B2: pdn_consent
  C2: pdn_general
  D1: pdn_crossborder
  D2: pdn_general
  E1: consumer_info
  E2: consumer_info
  F1: consumer_info
  F2: consumer_info
  F3: consumer_info
  G1: ads
  G3: ads
  H1: kids
