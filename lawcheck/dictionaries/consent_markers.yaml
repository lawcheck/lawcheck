# Формулировки чекбоксов согласия рядом с формами.
# consent_text_markers — общее согласие на обработку ПДн.
# marketing_consent_markers — отдельное согласие на рассылки/рекламу.

consent_text_markers:
  - "согласен на обработку персональных данных"
  - "соглашаюсь с политикой"
  - "принимаю условия обработки"
  - "даю согласие на обработку"
  - "ознакомлен с политикой конфиденциальности"

marketing_consent_markers:
  - "согласен на получение"
  - "хочу получать рассылку"
  - "согласен на получение рекламных"
  - "согласен на получение маркетинговых"
  - "подписаться на новости"
