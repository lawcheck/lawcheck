services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lawcheck
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lawcheck}
      POSTGRES_DB: lawcheck
    # Порт наружу НЕ публикуем — доступ только внутри compose-сети.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lawcheck"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Порт наружу НЕ публикуем — доступ только внутри compose-сети.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://lawcheck:${POSTGRES_PASSWORD:-lawcheck}@postgres:5432/lawcheck
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Наружу не публикуем — Caddy проксирует внутри сети по имени api:8000.
    expose:
      - "8000"
    command: ["uvicorn", "lawcheck.api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  worker:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://lawcheck:${POSTGRES_PASSWORD:-lawcheck}@postgres:5432/lawcheck
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "lawcheck"]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
      - goaccess_report:/srv/goaccess:ro
    depends_on:
      - api

  # Серверная аналитика: раз в 10 минут перечитывает access-лог Caddy и
  # обновляет HTML-отчёт. Без JS на страницах и без cookie — политика ПДн
  # сервиса не затрагивается. Отчёт: https://lawchek.ru/stats (basic auth).
  goaccess:
    image: allinurl/goaccess
    restart: unless-stopped
    entrypoint: /bin/sh
    command:
      - -c
      - |
        while true; do
          goaccess /srv/logs/access.log --log-format=CADDY \
            -o /srv/report/index.html --no-query-string || true
          sleep 600
        done
    volumes:
      - caddy_logs:/srv/logs:ro
      - goaccess_report:/srv/report

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  caddy_logs:
  goaccess_report:
