# CI/CD: тесты + деплой на прод (VPS Timeweb) при push в main.
#
# Повторяет ручную процедуру из handoff/TASKS.md §3: rsync кода на сервер,
# затем docker compose build api worker && up -d (шаблоны/код вшиты в образ
# при build — просто restart недостаточно).
#
# Что CI НЕ делает (остаётся ручным, как и раньше):
#   - docker compose restart caddy после правки Caddyfile;
#   - ALTER TABLE ... ADD COLUMN на прод-Postgres (create_all не добавляет
#     колонки в существующие таблицы).
#
# Секрет: DEPLOY_SSH_KEY — приватный ed25519-ключ, парный публичный лежит
# в /root/.ssh/authorized_keys на сервере (отдельный ключ только для CI,
# отзывается удалением строки github-actions-deploy@lawcheck).

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  DEPLOY_HOST: 5.129.200.118
  DEPLOY_USER: root
  DEPLOY_PATH: /root/lawcheck

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка зависимостей
        run: pip install -e ".[dev]"
      - name: Тесты
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: SSH-ключ и пиннинг host key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # host key прод-сервера, сверен с доверенным known_hosts владельца
          echo "${DEPLOY_HOST} ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJLmx+owImbyBf++4GFDTJYb6FE0Py6HT7NFgPspMxKu" >> ~/.ssh/known_hosts

      - name: Синхронизация кода на сервер
        run: |
          rsync -az \
            --exclude '__pycache__/' --exclude '.git/' --exclude '.venv/' \
            --exclude '*.db' --exclude '.env' \
            lawcheck pyproject.toml Dockerfile Caddyfile docker-compose.yml \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"

      - name: Сборка и перезапуск api + worker
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "cd ${DEPLOY_PATH} && docker compose build api worker && docker compose up -d api worker"

      - name: Проверка живости
        run: |
          sleep 5
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 10 https://lawchek.ru/healthz; then exit 0; fi
            sleep 5
          done
          echo "healthz не ответил после деплоя" >&2
          exit 1
